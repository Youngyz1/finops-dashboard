<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background: white;">
<title>FinOps AWS Cost Monitor — Architecture Diagram</title>
<desc>Four-layer pipeline: GitHub Actions triggers Python collector modules, which expose metrics to Prometheus, which feeds a Grafana dashboard. External connections to AWS APIs, Slack, and Jira.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="620" fill="white"/>

<!-- ── LAYER 1: GitHub Actions ── -->
<rect x="160" y="20" width="360" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="44" text-anchor="middle" dominant-baseline="central">GitHub Actions (cron)</text>
<text font-size="12" fill="#5F5E5A" x="340" y="64" text-anchor="middle" dominant-baseline="central">Runs daily at 08:00 UTC · workflow_dispatch</text>

<!-- Arrow GHA to Python -->
<line x1="340" y1="84" x2="340" y2="128" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── LAYER 2: Python Pipeline outer box ── -->
<rect x="120" y="130" width="440" height="200" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="340" y="154" text-anchor="middle" dominant-baseline="central">Python pipeline</text>

<!-- Module: cost_collector -->
<rect x="140" y="168" width="200" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#085041" x="240" y="184" text-anchor="middle" dominant-baseline="central">cost_collector.py</text>

<!-- Module: tag_checker -->
<rect x="140" y="208" width="200" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#085041" x="240" y="224" text-anchor="middle" dominant-baseline="central">tag_checker.py</text>

<!-- Module: anomaly_detector -->
<rect x="140" y="248" width="200" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#085041" x="240" y="264" text-anchor="middle" dominant-baseline="central">anomaly_detector.py</text>

<!-- Module: jira_reporter -->
<rect x="140" y="288" width="200" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#085041" x="240" y="304" text-anchor="middle" dominant-baseline="central">jira_reporter.py</text>

<!-- Module: metrics_exporter -->
<rect x="140" y="328" width="200" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#085041" x="240" y="344" text-anchor="middle" dominant-baseline="central">metrics_exporter.py</text>

<!-- Arrows to external services -->
<line x1="340" y1="184" x2="506" y2="184" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="508" y="168" width="148" height="32" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="12" font-weight="500" fill="#633806" x="582" y="184" text-anchor="middle" dominant-baseline="central">AWS Cost Explorer</text>

<line x1="340" y1="224" x2="506" y2="224" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="508" y="208" width="148" height="32" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="12" font-weight="500" fill="#633806" x="582" y="224" text-anchor="middle" dominant-baseline="central">AWS EC2 / S3 / RDS</text>

<line x1="340" y1="264" x2="506" y2="264" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="508" y="248" width="148" height="32" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="12" font-weight="500" fill="#27500A" x="582" y="264" text-anchor="middle" dominant-baseline="central">Slack webhook</text>

<line x1="340" y1="304" x2="506" y2="304" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="508" y="288" width="148" height="32" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="12" font-weight="500" fill="#0C447C" x="582" y="304" text-anchor="middle" dominant-baseline="central">Jira REST API</text>

<!-- Arrow Python to Prometheus -->
<line x1="240" y1="360" x2="240" y2="408" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="11" fill="#888780" x="252" y="388" dominant-baseline="central">:8000/metrics</text>

<!-- ── LAYER 3: Prometheus ── -->
<rect x="120" y="410" width="440" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#711B13" x="340" y="432" text-anchor="middle" dominant-baseline="central">Prometheus</text>
<text font-size="12" fill="#993C1D" x="340" y="452" text-anchor="middle" dominant-baseline="central">Scrapes every 60s · localhost:9090</text>

<!-- Arrow Prometheus to Grafana -->
<line x1="340" y1="466" x2="340" y2="508" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── LAYER 4: Grafana ── -->
<rect x="120" y="510" width="440" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="340" y="534" text-anchor="middle" dominant-baseline="central">Grafana dashboard · localhost:3000</text>
<text font-size="12" fill="#534AB7" x="340" y="556" text-anchor="middle" dominant-baseline="central">Daily cost by service</text>
<text font-size="12" fill="#534AB7" x="340" y="574" text-anchor="middle" dominant-baseline="central">Untagged resource count</text>
<text font-size="12" fill="#534AB7" x="340" y="590" text-anchor="middle" dominant-baseline="central">Active anomaly count</text>

</svg>
